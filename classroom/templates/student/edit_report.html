{% extends "student/base_student.html" %}
{% load static %}
{% block title %}แก้ไขรายงาน{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-10">

    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
        <h1 class="text-3xl font-bold text-[#3F2B96]">แก้ไขรายงาน</h1>
        <a href="{% url 'reporting_history' %}"
           class="px-5 py-2 rounded-full bg-[#3F2B96] text-white shadow 
                  hover:bg-[#5B49C9] transition duration-200">
            กลับ
        </a>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-xl border border-[#E6DEFF] p-8">

        <form method="post">
            {% csrf_token %}

            <!-- Storybook Title -->
            <div class="mb-6">
                <label class="block text-sm font-semibold text-[#3F2B96] mb-2">บทเรียน</label>
                <div class="px-4 py-3 rounded-lg bg-purple-50 border border-[#C6B8FF] text-[#3F2B96] font-medium">
                    {{ report.storybook.title }}
                </div>
            </div>

            <!-- Reason -->
            <div class="mb-6">
                <label class="block text-sm font-semibold text-[#3F2B96] mb-1">เหตุผลในการรายงาน</label>
                <input type="text" name="reason" value="{{ report.reason }}"
                       class="w-full px-4 py-3 rounded-lg border border-[#C6B8FF] shadow-sm
                              focus:ring-2 focus:ring-[#C6B8FF] focus:outline-none"
                       placeholder="ใส่เหตุผลว่าทำไมคุณถึงรายงาน..." required>
            </div>

            <!-- Details -->
            <div class="mb-8">
                <label class="block text-sm font-semibold text-[#3F2B96] mb-1">รายละเอียดเพิ่มเติม</label>
                <textarea name="detail" rows="4"
                          class="w-full px-4 py-3 rounded-lg border border-[#C6B8FF] shadow-sm
                                 focus:ring-2 focus:ring-[#C6B8FF] focus:outline-none"
                          placeholder="รายละเอียดที่ต้องการแจ้งเพิ่มเติม">{{ report.detail }}</textarea>
            </div>

            <!-- Submit -->
            <div class="flex justify-end">
                <button
                    class="px-6 py-3 bg-gradient-to-r from-[#3F2B96] to-[#5B49C9] text-white rounded-lg
                           shadow-md font-medium hover:opacity-90 transition duration-200">
                    บันทึกการเปลี่ยนแปลง
                </button>
            </div>

        </form>

    </div>

</div>
{% endblock %}
