{% extends "teacher/base_teacher.html" %}
{% load static %}
{% block title %}แก้ไขรายละเอียดบทเรียน{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto px-4 py-10 space-y-10">

    <!-- Header -->
    <div>
        <h1 class="text-3xl font-bold text-[#3F2B96] mb-2">แก้ไขรายละเอียดบทเรียน</h1>
        <p class="text-[#6B5B95] text-sm">คุณสามารถแก้ไขชื่อเรื่อง เนื้อหาบทเรียน และสิทธิ์การดาวน์โหลดได้ที่นี่</p>
    </div>

    <!-- Form -->
    <form method="post" action="{% url 'edit_lesson_detail' storybook.id %}" class="space-y-8 bg-white p-8 rounded-2xl shadow-md border border-[#E0D7FF]">
        {% csrf_token %}

        <!-- Lesson Title -->
        <div>
            <label for="title" class="block text-sm font-semibold text-[#3F2B96] mb-1">ชื่อบทเรียน</label>
            <input type="text" name="title" id="title" value="{{ storybook.title }}"
                   class="w-full border border-[#C1B5F1] rounded-lg px-4 py-2 text-sm focus:ring focus:ring-[#D8CCFF] focus:outline-none"
                   required>
        </div>

        <!-- Lesson Detail -->
        <div>
            <label for="detail_lesson" class="block text-sm font-semibold text-[#3F2B96] mb-1">รายละเอียดบทเรียน (เนื้อหา)</label>
            <textarea name="detail_lesson" id="detail_lesson" rows="5"
                      class="w-full border border-[#C1B5F1] rounded-lg px-4 py-2 text-sm focus:ring focus:ring-[#D8CCFF] focus:outline-none"
                      placeholder="พิมพ์รายละเอียดหรือเนื้อหาหลักของบทเรียน...">{{ storybook.detail_lesson }}</textarea>
        </div>

        <!-- Additional Details -->
        <div>
            <label for="Additional_lesson_details" class="block text-sm font-semibold text-[#3F2B96] mb-1">ข้อมูลเพิ่มเติม</label>
            <textarea name="Additional_lesson_details" id="Additional_lesson_details" rows="4"
                      class="w-full border border-[#C1B5F1] rounded-lg px-4 py-2 text-sm focus:ring focus:ring-[#D8CCFF] focus:outline-none"
                      placeholder="พิมพ์รายละเอียดเพิ่มเติม เช่น จุดประสงค์การเรียนรู้ หรือหมายเหตุ">{{ storybook.Additional_lesson_details }}</textarea>
        </div>

        <!-- Download Permission -->
        <div>
            <label for="download_permission" class="block text-sm font-semibold text-[#3F2B96] mb-1">สิทธิ์การดาวน์โหลด</label>
            <select name="download_permission" id="download_permission"
                    class="w-full border border-[#C1B5F1] rounded-lg px-4 py-2 text-sm focus:ring focus:ring-[#D8CCFF] focus:outline-none">
                <option value="public" {% if storybook.download_permission == 'public' %}selected{% endif %}>สาธารณะ (Public)</option>
                <option value="private" {% if storybook.download_permission == 'private' %}selected{% endif %}>ส่วนตัว (Private)</option>
            </select>
        </div>

        <!-- Submit -->
        <div class="flex justify-end">
            <button type="submit"
                    class="bg-gradient-to-r from-[#3F2B96] to-[#A8C0FF] text-white px-6 py-2 rounded-lg text-sm font-medium hover:opacity-90 transition">
                บันทึกการเปลี่ยนแปลง
            </button>
        </div>
    </form>
</div>
{% endblock %}
